[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "experiment-mangement"
dynamic = ["version"]
dependencies = [
    "dagshub",
]

[project.scripts]
download = "download_file:main"
upload = "upload_file:main"

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
local_scheme = "no-local-version"

