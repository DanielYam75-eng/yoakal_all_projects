[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mof-class-forecaster"
dynamic = ["version"]
dependencies = [
	"pandas",
	"numpy",
	"statsmodels",
	"pmdarima",
	"scikit-learn",
	]


[project.scripts]
forecast = "general_forecast.master_script:main"
